<nav class="header">
  <button class="back-btn" (click)="goHome()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M19 12H5M12 19l-7-7 7-7"/>
    </svg>
    Inicio
  </button>
  <h1 class="logo">Natureza</h1>
  <div class="header-spacer"></div>
</nav>

<main class="container">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-icon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </div>
      <h1 class="auth-title">Iniciar Sesión</h1>
      <p class="auth-subtitle">Ingresa a tu cuenta para continuar</p>
    </div>

    @if (error()) {
      <div class="error-message">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="15" y1="9" x2="9" y2="15"/>
          <line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
        <span>{{ error() }}</span>
      </div>
    }

    <form (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label class="form-label">Email</label>
        <div class="input-wrapper">
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <input 
            type="email" 
            class="form-input"
            placeholder="tu@email.com"
            [value]="email()"
            (input)="email.set($any($event.target).value)"
            autocomplete="email"
          />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <div class="input-wrapper">
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input 
            [type]="showPassword() ? 'text' : 'password'" 
            class="form-input"
            placeholder="Tu contraseña"
            [value]="password()"
            (input)="password.set($any($event.target).value)"
            autocomplete="current-password"
          />
          <button type="button" class="toggle-password" (click)="togglePassword()">
            @if (showPassword()) {
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            } @else {
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            }
          </button>
        </div>
      </div>

      <button 
        type="submit" 
        class="btn primary full-width"
        [disabled]="!isFormValid || submitting()"
      >
        @if (submitting()) {
          <span class="spinner-small"></span>
          Ingresando...
        } @else {
          Iniciar Sesión
        }
      </button>
    </form>

    <div class="auth-footer">
      <p><a routerLink="/recuperar-contrasena" class="link">¿Olvidaste tu contraseña?</a></p>
      <p>¿No tienes cuenta? <a routerLink="/registro" class="link">Regístrate aquí</a></p>
    </div>
  </div>
</main>
