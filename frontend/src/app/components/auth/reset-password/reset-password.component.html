<div class="auth-page">
  <div class="auth-card">
    <a routerLink="/" class="logo">Natureza</a>

    @if (done()) {
      <div class="sent-state">
        <div class="sent-icon">✅</div>
        <h2>¡Contraseña actualizada!</h2>
        <p>Tu contraseña ha sido restablecida. Redirigiendo al login…</p>
        <a routerLink="/login" class="btn-primary">Ir al login</a>
      </div>
    } @else {
      <h2 class="title">Nueva contraseña</h2>
      <p class="subtitle">Ingresa tu nueva contraseña.</p>

      @if (error()) {
        <div class="error-box">{{ error() }}</div>
      }

      <form (ngSubmit)="submit()" #f="ngForm">
        <div class="form-group">
          <label>Nueva contraseña</label>
          <input type="password" [(ngModel)]="newPassword" name="newPassword"
            placeholder="Mínimo 6 caracteres" required autocomplete="new-password"/>
        </div>
        <div class="form-group">
          <label>Confirmar contraseña</label>
          <input type="password" [(ngModel)]="confirm" name="confirm"
            placeholder="Repite la contraseña" required autocomplete="new-password"/>
        </div>
        <button type="submit" class="btn-primary" [disabled]="loading() || !token">
          @if (loading()) { Guardando… } @else { Guardar contraseña }
        </button>
      </form>
    }
  </div>
</div>
