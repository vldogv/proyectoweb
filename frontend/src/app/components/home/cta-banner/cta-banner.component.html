<section class="cta-banner">
  <div class="cta-container">
    <div class="cta-content">
      <h2 class="cta-title">Tu Piel Merece lo Mejor</h2>
      <p class="cta-text">Descubre nuestra colección completa de productos naturales y transforma tu rutina de cuidado personal.</p>
      <div class="cta-actions">
        <button class="cta-btn-primary" (click)="onShopNow()">
          Explorar Tienda
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </button>
        <div class="cta-guarantee">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            <polyline points="9 12 11 14 15 10"/>
          </svg>
          <span>Garantía de satisfacción de 30 días</span>
        </div>
      </div>
    </div>
    <div class="cta-features">
      <div class="feature">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/>
          <circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/>
        </svg>
        <span>Envío en 24-48h</span>
      </div>
      <div class="feature">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>
        </svg>
        <span>A toda la República</span>
      </div>
      <div class="feature">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"/>
          <path d="M12 6v2m0 8v2"/>
        </svg>
        <span>Pago seguro</span>
      </div>
    </div>
  </div>
</section>
